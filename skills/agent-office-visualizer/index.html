<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Agent Office Sim</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111726;
      --panel: #1a2334;
      --text: #dce5ff;
      --muted: #9fb0d1;
      --border: #2e3a53;
      --ok: #23d18b;
      --idle: #e05d75;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1b2742 0%, #0f1628 62%);
      color: var(--text);
      font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .office-shell {
      width: 1100px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #0f1726;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
    }

    canvas {
      display: block;
      width: 1100px;
      height: 720px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border-bottom: 1px solid var(--border);
      background: #0f1726;
    }

    .status-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      background: var(--panel);
      min-height: 58px;
    }

    .name-editor {
      border-top: 1px solid var(--border);
      padding: 10px;
      background: #151f31;
    }

    .name-editor h2 {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .name-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .name-grid label {
      display: grid;
      gap: 4px;
      font-size: 11px;
      color: var(--muted);
    }

    .name-grid input {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #0f1726;
      color: var(--text);
      padding: 7px 8px;
      font: inherit;
    }

    .badge {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.02);
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: inline-block;
    }

    .state {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="office-shell">
    <canvas id="office" width="1100" height="720" aria-label="Retro office simulation"></canvas>
    <div id="statusBar" class="status-bar"></div>
    <section class="name-editor" aria-label="Agent name editor">
      <h2>Editable Agent Names</h2>
      <div id="nameGrid" class="name-grid"></div>
    </section>
  </div>

  <script src="office-sim.js"></script>
</body>
</html>
